<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initiative Tracker Dashboard</title>
<script>try{var _t=localStorage.getItem('initiativeTracker.theme');if(_t)document.documentElement.setAttribute('data-theme',_t);}catch(e){}</script>
<style>
  :root{
    --bg:#0f1419; --panel:#1a2029; --panel-2:#212935; --line:#2c3645; --hover:#2a3340;
    --text:#e6edf3; --muted:#8b97a7; --accent:#4c8dff;
    --green:#2ea043; --yellow:#d9a40b; --red:#e5484d; --blue:#3b82f6; --gray:#6b7280;
    --green-bg:#16301c; --yellow-bg:#332806; --red-bg:#3a1416; --blue-bg:#10243f; --gray-bg:#23282f;
  }
  [data-theme="light"]{
    --bg:#f4f6f9; --panel:#ffffff; --panel-2:#eef1f5; --line:#d8dee6; --hover:#e6ebf2;
    --text:#1b2430; --muted:#5c6775; --accent:#2f6fed;
    --green:#1a7f37; --yellow:#b8860b; --red:#d32f37; --blue:#2f6fed; --gray:#8b95a3;
    --green-bg:#e4f4e9; --yellow-bg:#fbf3da; --red-bg:#fbe4e5; --blue-bg:#e4edfb; --gray-bg:#eaeef3;
  }
  [data-theme="light"] .b-green{color:#1a7f37;border-color:#a9d9bb}
  [data-theme="light"] .b-yellow{color:#9a6f06;border-color:#e3cf8f}
  [data-theme="light"] .b-red{color:#c0282f;border-color:#eeb0b2}
  [data-theme="light"] .b-blue{color:#1f5fd6;border-color:#aac6f4}
  [data-theme="light"] .b-gray{color:#5c6775;border-color:#cdd4dd}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);font-size:14px;line-height:1.4}
  header{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;
    justify-content:space-between;gap:16px;flex-wrap:wrap;position:sticky;top:0;background:var(--bg);z-index:30}
  h1{font-size:20px;margin:0;letter-spacing:-.2px}
  .sub{color:var(--muted);font-size:12px;margin-top:3px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  button{font-family:inherit;font-size:13px;border:1px solid var(--line);background:var(--panel-2);
    color:var(--text);padding:7px 12px;border-radius:7px;cursor:pointer;transition:.12s}
  button:hover{border-color:var(--accent);background:var(--hover)}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  button.primary:hover{background:#3d7cf0}
  button.ghost{background:transparent}
  button.danger:hover{border-color:var(--red);color:var(--red)}
  select,input,textarea{font-family:inherit;font-size:13px;background:var(--panel);color:var(--text);
    border:1px solid var(--line);border-radius:6px;padding:6px 8px}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--accent)}

  /* Summary bar */
  .summary{display:flex;gap:10px;flex-wrap:wrap;padding:16px 24px;border-bottom:1px solid var(--line)}
  .stat{flex:1;min-width:120px;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;position:relative;overflow:hidden}
  .stat .n{font-size:26px;font-weight:700}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .stat .bar{height:3px;border-radius:3px;margin-top:8px;background:var(--line)}
  .stat.total{border-color:var(--accent)}

  /* Section progress summary */
  .sec-summary-wrap{padding:0 24px 16px;border-bottom:1px solid var(--line)}
  .ss-head{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
  .sec-summary{display:flex;gap:10px;flex-wrap:wrap}
  .ss-card{flex:1;min-width:210px;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;cursor:pointer;transition:.12s}
  .ss-card:hover{border-color:var(--accent);background:var(--panel-2)}
  .ss-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:8px}
  .ss-name{font-weight:600;font-size:14px}
  .ss-pct{font-size:13px;color:var(--text);font-weight:700;white-space:nowrap}
  .ss-bar{height:8px;border-radius:5px;overflow:hidden;display:flex;background:var(--gray-bg);margin-bottom:10px}
  .ss-bar span{display:block;height:100%}
  .ss-foot{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
  .ss-health{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
  .ss-counts{display:flex;gap:9px;font-size:11px;color:var(--muted)}
  .ss-counts i{display:inline-flex;align-items:center;gap:3px;font-style:normal}
  .ss-counts .dot{width:7px;height:7px}

  /* Filters */
  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:12px 24px;border-bottom:1px solid var(--line);
    background:var(--panel)}
  .filters label{color:var(--muted);font-size:12px;margin-right:4px}
  .spacer{flex:1}

  main{padding:20px 24px;display:flex;flex-direction:column;gap:18px;max-width:1400px;margin:0 auto}

  /* Section card */
  .section{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .sec-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;
    background:linear-gradient(180deg,var(--panel-2),var(--panel))}
  .sec-head .caret{transition:.15s;color:var(--muted);font-size:12px}
  .section.collapsed .caret{transform:rotate(-90deg)}
  .sec-title{font-size:16px;font-weight:650;flex:1}
  .sec-title small{font-weight:400;color:var(--muted);font-size:12px;margin-left:8px}
  .sec-name{padding:2px 6px;border-radius:5px;cursor:text;display:inline-block}
  .sec-name:hover{background:var(--panel);box-shadow:inset 0 0 0 1px var(--line)}
  .sec-name.editing{background:var(--bg);box-shadow:inset 0 0 0 1px var(--accent);cursor:text}
  .sec-progress{display:flex;gap:4px;align-items:center}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 8px;border-radius:20px;
    background:var(--panel);border:1px solid var(--line);color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:50%}
  .sec-mini-bar{width:130px;height:7px;border-radius:5px;overflow:hidden;display:flex;background:var(--gray-bg)}
  .sec-mini-bar span{display:block;height:100%}

  .sec-body{padding:6px 14px 14px;display:flex;flex-direction:column;gap:7px}
  .section.collapsed .sec-body{display:none}

  /* Task row */
  .task{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;
    background:var(--panel-2);border:1px solid var(--line);border-left-width:4px}
  .task.done .t-name{text-decoration:line-through;opacity:.65}
  .task .t-name{flex:1;font-size:14px;font-weight:500}
  .task .t-name .note{display:block;color:var(--muted);font-size:12px;font-weight:400;margin-top:2px}
  .badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
  .team-tag{font-size:11px;padding:3px 9px;border-radius:6px;background:var(--panel);border:1px solid var(--line);
    color:var(--muted);white-space:nowrap}
  .t-name-edit{padding:1px 5px;border-radius:4px;cursor:text}
  .t-name-edit:hover{box-shadow:inset 0 0 0 1px var(--line)}
  .t-name-edit.editing{background:var(--bg);box-shadow:inset 0 0 0 1px var(--accent);cursor:text}
  .t-date{font-size:12px;padding:4px 7px;border-radius:6px;background:var(--panel);border:1px solid var(--line);
    color:var(--muted);width:138px;cursor:pointer}
  .t-date:hover{border-color:var(--accent)}
  .t-date::-webkit-calendar-picker-indicator{opacity:.5;cursor:pointer}
  .t-date.overdue{border-color:var(--red)!important;color:var(--red)!important}
  .t-date.soon{border-color:var(--yellow)!important;color:var(--yellow)!important}
  .owner-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);white-space:nowrap}
  .owner-select{font-size:11px;padding:3px 6px;border-radius:6px;background:var(--panel);
    border:1px solid var(--line);color:var(--muted);max-width:130px;cursor:pointer}
  .owner-select:hover{border-color:var(--accent)}
  .t-actions{display:flex;gap:5px;opacity:0;transition:.12s}
  .task:hover .t-actions{opacity:1}
  .t-actions button{padding:4px 8px;font-size:12px}
  .status-select{min-width:130px}
  .cmt-btn{font-size:11px;padding:3px 9px;border-radius:6px;background:var(--panel);border:1px solid var(--line);
    color:var(--muted);white-space:nowrap;cursor:pointer}
  .cmt-btn.has{color:var(--accent);border-color:var(--accent)}
  .cmt-btn.open{background:var(--hover);border-color:var(--accent)}

  /* Drag-to-rank */
  .task-wrap[draggable="true"]{cursor:grab}
  .task-wrap.dragging{opacity:.3;pointer-events:none}
  .task-wrap.drag-over>.task{outline:2px solid var(--accent);outline-offset:-1px}
  .t-rank{font-size:11px;font-weight:700;color:var(--muted);min-width:20px;text-align:center;
    flex-shrink:0;background:var(--panel);border:1px solid var(--line);border-radius:5px;
    padding:2px 5px;user-select:none}
  .drag-handle{font-size:16px;color:var(--muted);cursor:grab;flex-shrink:0;opacity:.35;
    line-height:1;padding:0 2px;user-select:none;transition:.12s}
  .task:hover .drag-handle{opacity:.85}

  /* Inline comments thread (shown under each task) */
  .task-wrap{display:flex;flex-direction:column}
  .task-comments{margin:3px 0 4px 16px;padding:8px 12px;border-left:2px solid var(--line);
    display:flex;flex-direction:column;gap:7px}
  .cmt{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px 10px}
  .cmt-head{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-bottom:3px}
  .cmt-head b{color:var(--text);font-size:12px}
  .cmt-head .when{flex:1}
  .cmt-head .cmt-del{padding:2px 6px;font-size:11px;opacity:0;transition:.12s}
  .cmt:hover .cmt-del{opacity:1}
  .cmt-text{font-size:13px;white-space:pre-wrap;word-break:break-word}
  .cmt-add{display:flex;gap:6px;align-items:center}
  .cmt-add input{flex:1}
  .cmt-add button{padding:5px 11px;font-size:12px}
  .cmt-as{font-size:11px;color:var(--muted);cursor:pointer;white-space:nowrap}
  .cmt-as:hover{color:var(--accent)}

  /* status colors */
  .s-green{border-left-color:var(--green)} .b-green{background:var(--green-bg);color:#7ee2a8;border:1px solid #2c6e3f}
  .s-yellow{border-left-color:var(--yellow)} .b-yellow{background:var(--yellow-bg);color:#f5d272;border:1px solid #7a5e10}
  .s-red{border-left-color:var(--red)} .b-red{background:var(--red-bg);color:#ff9ea1;border:1px solid #7d2a2d}
  .s-blue{border-left-color:var(--blue)} .b-blue{background:var(--blue-bg);color:#93c2ff;border:1px solid #2a5599}
  .s-gray{border-left-color:var(--gray)} .b-gray{background:var(--gray-bg);color:#b3bcc8;border:1px solid #3a424d}

  .add-task-row{display:flex;gap:8px;margin-top:4px}
  .add-task-row input{flex:1}

  .empty{color:var(--muted);font-size:13px;padding:10px 12px;font-style:italic}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50}
  .modal-bg.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;width:440px;max-width:92vw}
  .modal h3{margin:0 0 14px}
  .modal .row{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
  .modal label{font-size:12px;color:var(--muted)}
  .modal .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:6px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);padding:10px 24px;border-bottom:1px solid var(--line)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  @media(max-width:680px){
    .task{flex-wrap:wrap}.t-actions{opacity:1}.status-select{min-width:110px}
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>🎯 Initiative Tracker</h1>
    <div class="sub" id="lastSaved">Loading…</div>
  </div>
  <div class="toolbar">
    <button class="ghost" id="themeBtn" onclick="toggleTheme()" title="Toggle light / dark">🌙 Dark</button>
    <button class="ghost" onclick="collapseAll(true)">Collapse all</button>
    <button class="ghost" onclick="collapseAll(false)">Expand all</button>
    <button onclick="openSectionModal()">+ Section</button>
    <button onclick="syncFromRepo()" title="Pull the latest shared board pushed to Git">↻ Sync from repo</button>
    <button onclick="exportData()" title="Download data.json to commit to the repo">⤓ Export data.json</button>
    <button onclick="document.getElementById('importFile').click()">Import</button>
    <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
    <button class="danger ghost" onclick="resetData()">Reset</button>
  </div>
</header>

<div class="legend">
  <strong style="color:var(--text)">Status legend:</strong>
  <span><i class="dot" style="background:var(--green)"></i>On track</span>
  <span><i class="dot" style="background:var(--yellow)"></i>Some risk</span>
  <span><i class="dot" style="background:var(--red)"></i>At risk</span>
  <span><i class="dot" style="background:var(--blue)"></i>Done</span>
  <span><i class="dot" style="background:var(--gray)"></i>Not started</span>
</div>

<div class="summary" id="summary"></div>

<div class="sec-summary-wrap">
  <div class="ss-head">Progress by section</div>
  <div class="sec-summary" id="secSummary"></div>
</div>

<div class="filters">
  <span><label>Owner</label>
    <select id="filterTeam" onchange="render()"><option value="">All owners</option></select>
  </span>
  <span><label>Status</label>
    <select id="filterStatus" onchange="render()">
      <option value="">All statuses</option>
      <option value="green">On track</option>
      <option value="yellow">Some risk</option>
      <option value="red">At risk</option>
      <option value="blue">Done</option>
      <option value="gray">Not started</option>
    </select>
  </span>
  <span><label>Search</label><input id="filterText" placeholder="Filter tasks…" oninput="render()"></span>
  <div class="spacer"></div>
  <span><label>Manage owners</label><button class="ghost" onclick="manageTeams()">Edit owners</button></span>
</div>

<main id="board"></main>

<!-- Section modal -->
<div class="modal-bg" id="sectionModal">
  <div class="modal">
    <h3 id="secModalTitle">New Section</h3>
    <div class="row"><label>Section name</label><input id="secName" placeholder="e.g. Stella Agent"></div>
    <div class="actions">
      <button class="ghost" onclick="closeModal('sectionModal')">Cancel</button>
      <button class="primary" onclick="saveSection()">Save</button>
    </div>
  </div>
</div>

<!-- Task modal -->
<div class="modal-bg" id="taskModal">
  <div class="modal">
    <h3 id="taskModalTitle">Edit Task</h3>
    <div class="row"><label>Task</label><input id="taskName"></div>
    <div class="row"><label>Notes / detail</label><textarea id="taskNote" rows="2"></textarea></div>
    <div class="row"><label>Owner</label><select id="taskTeam"></select></div>
    <div class="row"><label>Status</label>
      <select id="taskStatus">
        <option value="gray">⬤ Not started</option>
        <option value="green">⬤ On track</option>
        <option value="yellow">⬤ Some risk</option>
        <option value="red">⬤ At risk</option>
        <option value="blue">⬤ Done</option>
      </select>
    </div>
    <div class="row"><label>Completion date</label><input type="date" id="taskDueDate"></div>
    <div class="actions">
      <button class="ghost" onclick="closeModal('taskModal')">Cancel</button>
      <button class="primary" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<script>
const STATUSES = {
  green:{label:'On track', cls:'b-green'},
  yellow:{label:'Some risk', cls:'b-yellow'},
  red:{label:'At risk', cls:'b-red'},
  blue:{label:'Done', cls:'b-blue'},
  gray:{label:'Not started', cls:'b-gray'},
};
const STORE_KEY = 'initiativeTracker.v1';
const THEME_KEY = 'initiativeTracker.theme';

function applyTheme(t){
  const light = t==='light';
  document.documentElement.setAttribute('data-theme', light?'light':'dark');
  const b=document.getElementById('themeBtn');
  if(b) b.textContent = light ? '☀️ Light' : '🌙 Dark';
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')==='light'?'light':'dark';
  const next=cur==='light'?'dark':'light';
  try{localStorage.setItem(THEME_KEY,next)}catch(e){}
  applyTheme(next);
}

const SEED = {
  teams: ['Hcene','Andrei','Jashan','Asim','Alex','Oleksandr','Navreet','Nitesh','Shakshi','Unassigned'],
  sections: [
    { id:uid(), name:'Stella Agent', collapsed:false, tasks:[
      t('Agent DB Session Handling'),
      t('Follow up mechanism'),
      t('Agent execution plan'),
      t('Natural language, non-technical communication'),
      t('System Prompt Engineering'),
      t('Guardrails'),
    ]},
    { id:uid(), name:'MCP Tools', collapsed:false, tasks:[
      t('Optimize Description'),
      t('Authentication',null,'MC / XS'),
      t('Accuracy Evaluation pipeline',null,'MC / XS'),
      t('Deployment / Publishing / Hosting',null,'M'),
      t('MC API Tools'),
      t('Organize',null,'M'),
      t('Standardize',null,'M'),
      t('Async API',null,'XS'),
      t('Permissions / Skills / Workflows'),
    ]},
    { id:uid(), name:'Cloud Intern', collapsed:false, tasks:[
      t('Proxy Resolve',null,'M'),
      t('G Overhead',null,'M'),
      t('High availability',null,'M'),
      t('Telemetry',null,'M'),
      t('Recording',null,'M'),
      t('Streaming support'),
    ]},
    { id:uid(), name:'UI Plus', collapsed:false, tasks:[
      t('Login / Set Server'),
    ]},
  ]
};

function uid(){return Math.random().toString(36).slice(2,10)}
function t(name, team, note){return {id:uid(), name, team:team||'Unassigned', note:note||'', status:'gray', dueDate:'', comments:[]}}
function dueDateCls(d){
  if(!d) return '';
  const diff=(new Date(d)-new Date(new Date().toDateString()))/86400000;
  if(diff<0) return ' overdue';
  if(diff<=7) return ' soon';
  return '';
}

let data = JSON.parse(JSON.stringify(SEED));   // placeholder until init() resolves

async function fetchShared(){
  // Loads the shared board committed to the repo (data.json next to this page).
  const r = await fetch('data.json?ts=' + Date.now(), {cache:'no-store'});
  if(!r.ok) throw new Error('no data.json');
  return await r.json();
}

async function init(){
  const raw = (()=>{ try{return localStorage.getItem(STORE_KEY)}catch(e){return null} })();
  if(raw){
    // Returning visitor: use their local copy for tasks/statuses/comments…
    try{ data = JSON.parse(raw); }catch(e){}
    // …but always refresh the Owner roster from the repo so a pushed owner
    // list reaches everyone without wiping their local edits.
    try{
      const shared = await fetchShared();
      if(shared && Array.isArray(shared.teams)) data.teams = shared.teams;
    }catch(e){}
  } else {
    // First visit: pull the shared board from the repo if it's published, else seed.
    try{ data = await fetchShared(); }
    catch(e){ data = JSON.parse(JSON.stringify(SEED)); }
  }
  applyTheme((()=>{ try{return localStorage.getItem(THEME_KEY)}catch(e){return null} })() || 'dark');
  render(); save();
}

// Pull the latest shared board that was pushed to Git, overwriting the local copy.
async function syncFromRepo(){
  if(!confirm('Replace your current board with the shared version from the repo (data.json)?\nYour local edits will be lost.')) return;
  try{
    data = await fetchShared();
    save(); render();
    alert('Synced to the latest shared board from the repo.');
  }catch(e){
    alert('Could not load data.json from the repo.\nMake sure it has been committed/published next to index.html.');
  }
}

function save(){
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
  document.getElementById('lastSaved').textContent =
    'Saved locally · ' + new Date().toLocaleString();
}

/* ---------- rendering ---------- */
function render(){
  refreshTeamFilter();
  renderSummary();
  renderSectionSummary();
  renderBoard();
}

function sectionHealth(c,total){
  if(total===0)        return {l:'Empty', cls:'b-gray'};
  if(c.blue===total)   return {l:'Complete', cls:'b-blue'};
  if(c.red>0)          return {l:'At risk', cls:'b-red'};
  if(c.yellow>0)       return {l:'Some risk', cls:'b-yellow'};
  if(c.green>0)        return {l:'On track', cls:'b-green'};
  return {l:'Not started', cls:'b-gray'};
}

function renderSectionSummary(){
  const el=document.getElementById('secSummary');
  el.innerHTML = data.sections.map(sec=>{
    const c={green:0,yellow:0,red:0,blue:0,gray:0};
    sec.tasks.forEach(tk=>c[tk.status]++);
    const total=sec.tasks.length;
    const pct = total? Math.round(c.blue/total*100):0;
    const seg=(k,col)=> c[k]? `<span style="width:${c[k]/total*100}%;background:${col}" title="${STATUSES[k].label}: ${c[k]}"></span>`:'';
    const h=sectionHealth(c,total);
    const ci=(k,col)=> c[k]? `<i title="${STATUSES[k].label}"><span class="dot" style="background:${col}"></span>${c[k]}</i>`:'';
    return `<div class="ss-card" onclick="scrollToSection('${sec.id}')" title="Jump to ${esc(sec.name)}">
      <div class="ss-top"><span class="ss-name">${esc(sec.name)}</span><span class="ss-pct">${pct}% done</span></div>
      <div class="ss-bar">${seg('blue','var(--blue)')}${seg('green','var(--green)')}${seg('yellow','var(--yellow)')}${seg('red','var(--red)')}${seg('gray','var(--gray)')}</div>
      <div class="ss-foot">
        <span class="ss-health ${h.cls}">${h.l}</span>
        <span class="ss-counts">${ci('green','var(--green)')}${ci('yellow','var(--yellow)')}${ci('red','var(--red)')}${ci('blue','var(--blue)')}${ci('gray','var(--gray)')}<i title="Total tasks" style="color:var(--muted)">· ${total} task${total!==1?'s':''}</i></span>
      </div>
    </div>`;
  }).join('');
}

function scrollToSection(id){
  const s=findSection(id);
  if(s && s.collapsed){ s.collapsed=false; save(); renderBoard(); }
  const el=document.getElementById('sec-'+id);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

function refreshTeamFilter(){
  const sel = document.getElementById('filterTeam');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All owners</option>' +
    data.teams.map(tm=>`<option ${tm===cur?'selected':''}>${esc(tm)}</option>`).join('');
}

function activeFilters(){
  return {
    team: document.getElementById('filterTeam').value,
    status: document.getElementById('filterStatus').value,
    text: document.getElementById('filterText').value.trim().toLowerCase(),
  };
}
function taskMatches(tk, f){
  if(f.team && tk.team!==f.team) return false;
  if(f.status && tk.status!==f.status) return false;
  if(f.text && !(tk.name+' '+tk.note).toLowerCase().includes(f.text)) return false;
  return true;
}

function renderSummary(){
  const counts={green:0,yellow:0,red:0,blue:0,gray:0,total:0};
  data.sections.forEach(s=>s.tasks.forEach(tk=>{counts[tk.status]++;counts.total++}));
  const el=document.getElementById('summary');
  const card=(n,l,color,key)=>{
    const pct = counts.total? Math.round(counts[key]/counts.total*100):0;
    return `<div class="stat"><div class="n" style="color:${color}">${n}</div>
      <div class="l">${l}</div><div class="bar"><div style="width:${pct}%;height:100%;background:${color};border-radius:3px"></div></div></div>`;
  };
  el.innerHTML =
    `<div class="stat total"><div class="n">${counts.total}</div><div class="l">Total tasks</div>
       <div class="bar"></div></div>`+
    card(counts.green,'On track','var(--green)','green')+
    card(counts.yellow,'Some risk','var(--yellow)','yellow')+
    card(counts.red,'At risk','var(--red)','red')+
    card(counts.blue,'Done','var(--blue)','blue')+
    card(counts.gray,'Not started','var(--gray)','gray');
}

function renderBoard(){
  const f=activeFilters();
  const board=document.getElementById('board');
  board.innerHTML='';
  data.sections.forEach(sec=>{
    const visible = sec.tasks.filter(tk=>taskMatches(tk,f));
    const c={green:0,yellow:0,red:0,blue:0,gray:0};
    sec.tasks.forEach(tk=>c[tk.status]++);
    const total=sec.tasks.length||1;
    const seg=(k,col)=>`<span style="width:${c[k]/total*100}%;background:${col}"></span>`;

    const div=document.createElement('div');
    div.id='sec-'+sec.id;
    div.className='section'+(sec.collapsed?' collapsed':'');
    div.innerHTML=`
      <div class="sec-head" onclick="toggleSection('${sec.id}',event)">
        <span class="caret">▼</span>
        <span class="sec-title"><span class="sec-name" title="Double-click to rename"
            onclick="event.stopPropagation()"
            ondblclick="startEditName(event,'${sec.id}')"
            onkeydown="nameKey(event,'${sec.id}')"
            onblur="commitName(event,'${sec.id}')">${esc(sec.name)}</span> <small>${sec.tasks.length} task${sec.tasks.length!==1?'s':''}</small></span>
        <div class="sec-progress">
          ${c.blue>0?`<span class="pill"><i class="dot" style="background:var(--blue)"></i>${c.blue} done</span>`:''}
          ${c.red>0?`<span class="pill"><i class="dot" style="background:var(--red)"></i>${c.red}</span>`:''}
          <div class="sec-mini-bar" title="status breakdown">
            ${seg('blue','var(--blue)')}${seg('green','var(--green)')}${seg('yellow','var(--yellow)')}${seg('red','var(--red)')}${seg('gray','var(--gray)')}
          </div>
        </div>
        <button class="ghost" onclick="renameSection('${sec.id}',event)" title="Rename">✎</button>
        <button class="ghost danger" onclick="deleteSection('${sec.id}',event)" title="Delete section">🗑</button>
      </div>
      <div class="sec-body">
        ${visible.length? visible.map(tk=>taskRow(sec,tk,sec.tasks.indexOf(tk)+1)).join('') :
          `<div class="empty">${sec.tasks.length?'No tasks match filters.':'No tasks yet.'}</div>`}
        <div class="add-task-row">
          <input placeholder="Add a task to ${esc(sec.name)}…" onkeydown="if(event.key==='Enter')addTask('${sec.id}',this)">
          <button onclick="addTask('${sec.id}',this.previousElementSibling)">Add</button>
        </div>
      </div>`;
    board.appendChild(div);
  });
}

function taskRow(sec,tk,rank){
  const st=STATUSES[tk.status];
  const done = tk.status==='blue';
  const opts=Object.entries(STATUSES).map(([k,v])=>
    `<option value="${k}" ${k===tk.status?'selected':''}>${v.label}</option>`).join('');
  const cs = tk.comments||[];
  const open = isThreadOpen(tk);
  const me = esc(getCommenter()||'you');
  const thread = open ? `
    <div class="task-comments">
      ${cs.map(c=>`
        <div class="cmt">
          <div class="cmt-head"><b>${esc(c.author||'Anonymous')}</b>
            <span class="when">${new Date(c.ts).toLocaleString()}</span>
            <button class="ghost danger cmt-del" onclick="deleteCommentDirect('${sec.id}','${tk.id}','${c.id}')" title="Delete comment">🗑</button>
          </div>
          <div class="cmt-text">${esc(c.text)}</div>
        </div>`).join('')}
      <div class="cmt-add">
        <input class="cmt-inline-input" placeholder="Add a comment…"
          onkeydown="if(event.key==='Enter'){event.preventDefault();addInlineComment('${sec.id}','${tk.id}',this)}">
        <button onclick="addInlineComment('${sec.id}','${tk.id}',this.previousElementSibling)">Comment</button>
        <span class="cmt-as" onclick="changeName()" title="Change your display name">as ${me} ✎</span>
      </div>
    </div>` : '';
  return `<div class="task-wrap" draggable="true"
      ondragstart="taskDragStart(event,'${sec.id}','${tk.id}')"
      ondragover="taskDragOver(event,'${sec.id}','${tk.id}')"
      ondragleave="taskDragLeave(event)"
      ondrop="taskDrop(event,'${sec.id}','${tk.id}')"
      ondragend="taskDragEnd()">
    <div class="task s-${tk.status}${done?' done':''}">
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <span class="t-rank">${rank}</span>
      <span class="badge ${st.cls}">${st.label}</span>
      <span class="t-name"><span class="t-name-edit" title="Double-click to edit"
          onclick="event.stopPropagation()"
          ondblclick="startEditTaskName(event,'${sec.id}','${tk.id}')"
          onkeydown="taskNameKey(event,'${sec.id}','${tk.id}')"
          onblur="commitTaskName(event,'${sec.id}','${tk.id}')">${esc(tk.name)}</span>${tk.note?`<span class="note">${esc(tk.note)}</span>`:''}</span>
      <span class="owner-tag" title="Owner">👤
        <select class="owner-select" onchange="setOwner('${sec.id}','${tk.id}',this.value)">
          ${(data.teams.includes(tk.team)?data.teams:[tk.team,...data.teams]).map(tm=>`<option ${tm===tk.team?'selected':''}>${esc(tm)}</option>`).join('')}
        </select></span>
      <input type="date" class="t-date${dueDateCls(tk.dueDate||'')}" value="${tk.dueDate||''}"
        onchange="setDueDate('${sec.id}','${tk.id}',this.value)"
        title="${tk.dueDate?'Due: '+tk.dueDate:'Set completion date'}">
      <button class="cmt-btn${cs.length?' has':''}${open?' open':''}" onclick="toggleComments('${tk.id}')" title="Show / hide comments">💬 ${cs.length}</button>
      <select class="status-select" onchange="setStatus('${sec.id}','${tk.id}',this.value)">${opts}</select>
      <div class="t-actions">
        ${done
          ? `<button onclick="setStatus('${sec.id}','${tk.id}','green')" title="Reopen">↩ Reopen</button>`
          : `<button onclick="setStatus('${sec.id}','${tk.id}','blue')" title="Mark done">✓ Resolve</button>`}
        <button onclick="editTask('${sec.id}','${tk.id}')" title="Edit">✎</button>
        <button class="danger" onclick="deleteTask('${sec.id}','${tk.id}')" title="Delete">🗑</button>
      </div>
    </div>
    ${thread}
  </div>`;
}

/* ---------- drag-to-rank ---------- */
let dragSrc = null;
function taskDragStart(e,sid,tid){
  dragSrc={sid,tid};
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>e.currentTarget.classList.add('dragging'),0);
}
function taskDragOver(e,sid,tid){
  e.preventDefault();
  if(!dragSrc||dragSrc.sid!==sid||dragSrc.tid===tid)return;
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.task-wrap.drag-over').forEach(el=>el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function taskDragLeave(e){
  if(!e.currentTarget.contains(e.relatedTarget))e.currentTarget.classList.remove('drag-over');
}
function taskDrop(e,sid,tid){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragSrc||dragSrc.sid!==sid||dragSrc.tid===tid)return;
  const sec=findSection(sid);
  const from=sec.tasks.findIndex(t=>t.id===dragSrc.tid);
  const to=sec.tasks.findIndex(t=>t.id===tid);
  if(from===-1||to===-1)return;
  const [task]=sec.tasks.splice(from,1);
  sec.tasks.splice(to,0,task);
  dragSrc=null; save(); render();
}
function taskDragEnd(){
  document.querySelectorAll('.task-wrap.dragging,.task-wrap.drag-over')
    .forEach(el=>el.classList.remove('dragging','drag-over'));
  dragSrc=null;
}

/* ---------- mutations ---------- */
function findSection(id){return data.sections.find(s=>s.id===id)}
function findTask(sid,tid){const s=findSection(sid);return s&&s.tasks.find(t=>t.id===tid)}

function setStatus(sid,tid,val){const tk=findTask(sid,tid);if(tk){tk.status=val;save();render()}}
function setOwner(sid,tid,val){const tk=findTask(sid,tid);if(tk){tk.team=val;save();render()}}
function setDueDate(sid,tid,val){const tk=findTask(sid,tid);if(tk){tk.dueDate=val;save();render()}}

/* inline task-name editing (double-click on the board) */
function startEditTaskName(e,sid,tid){
  e.stopPropagation();
  const span=e.currentTarget;
  span.contentEditable='true';span.classList.add('editing');span.focus();
  const r=document.createRange();r.selectNodeContents(span);
  const sel=getSelection();sel.removeAllRanges();sel.addRange(r);
}
function taskNameKey(e,sid,tid){
  if(e.key==='Enter'){e.preventDefault();e.currentTarget.blur();}
  else if(e.key==='Escape'){e.preventDefault();e.currentTarget.textContent=findTask(sid,tid).name;e.currentTarget.blur();}
}
function commitTaskName(e,sid,tid){
  const span=e.currentTarget;
  span.contentEditable='false';span.classList.remove('editing');
  const v=span.textContent.trim();const tk=findTask(sid,tid);
  if(v&&v!==tk.name){tk.name=v;save();render();}
  else{span.textContent=tk.name;}
}
function toggleSection(id,e){if(e.target.closest('button'))return;const s=findSection(id);s.collapsed=!s.collapsed;save();renderBoard()}
function collapseAll(v){data.sections.forEach(s=>s.collapsed=v);save();renderBoard()}

function addTask(sid,input){
  const name=input.value.trim();if(!name)return;
  findSection(sid).tasks.push(t(name,'Unassigned'));
  input.value='';save();render();
}
function deleteTask(sid,tid){
  if(!confirm('Delete this task?'))return;
  const s=findSection(sid);s.tasks=s.tasks.filter(x=>x.id!==tid);save();render();
}
function deleteSection(id,e){e.stopPropagation();
  if(!confirm('Delete this entire section and its tasks?'))return;
  data.sections=data.sections.filter(s=>s.id!==id);save();render();
}
function renameSection(id,e){e.stopPropagation();
  const span=document.querySelector(`.sec-name[ondblclick*="${id}"]`);
  if(span){startEditName({stopPropagation(){},currentTarget:span},id);return}
  const s=findSection(id);const n=prompt('Section name:',s.name);
  if(n&&n.trim()){s.name=n.trim();save();render()}
}
function startEditName(e,id){
  e.stopPropagation();
  const span=e.currentTarget;
  span.contentEditable='true';span.classList.add('editing');
  span.focus();
  const r=document.createRange();r.selectNodeContents(span);
  const sel=getSelection();sel.removeAllRanges();sel.addRange(r);
}
function nameKey(e,id){
  if(e.key==='Enter'){e.preventDefault();e.currentTarget.blur();}
  else if(e.key==='Escape'){e.preventDefault();e.currentTarget.textContent=findSection(id).name;e.currentTarget.blur();}
}
function commitName(e,id){
  const span=e.currentTarget;
  span.contentEditable='false';span.classList.remove('editing');
  const v=span.textContent.trim();const s=findSection(id);
  if(v&&v!==s.name){s.name=v;save();render();}
  else{span.textContent=s.name;}
}

/* ----- section modal (add) ----- */
function openSectionModal(){document.getElementById('secName').value='';openModal('sectionModal');setTimeout(()=>document.getElementById('secName').focus(),50)}
function saveSection(){
  const n=document.getElementById('secName').value.trim();if(!n)return;
  data.sections.push({id:uid(),name:n,collapsed:false,tasks:[]});
  closeModal('sectionModal');save();render();
}

/* ----- task modal (edit) ----- */
let editing={sid:null,tid:null};
function editTask(sid,tid){
  editing={sid,tid};const tk=findTask(sid,tid);
  document.getElementById('taskName').value=tk.name;
  document.getElementById('taskNote').value=tk.note||'';
  const ts=document.getElementById('taskTeam');
  ts.innerHTML=data.teams.map(tm=>`<option ${tm===tk.team?'selected':''}>${esc(tm)}</option>`).join('');
  document.getElementById('taskStatus').value=tk.status;
  document.getElementById('taskDueDate').value=tk.dueDate||'';
  openModal('taskModal');
}
function saveTask(){
  const tk=findTask(editing.sid,editing.tid);if(!tk)return;
  tk.name=document.getElementById('taskName').value.trim()||tk.name;
  tk.note=document.getElementById('taskNote').value.trim();
  tk.team=document.getElementById('taskTeam').value;
  tk.status=document.getElementById('taskStatus').value;
  tk.dueDate=document.getElementById('taskDueDate').value;
  closeModal('taskModal');save();render();
}

/* ----- comments (inline, on the board) ----- */
const COMMENTER_KEY = 'initiativeTracker.commenter';
const cmtOverride = new Map();   // tid -> bool (user expand/collapse; default = open if it has comments)

function getCommenter(){ try{return localStorage.getItem(COMMENTER_KEY)||''}catch(e){return ''} }
function ensureCommenter(){
  let name=getCommenter();
  if(!name){ name=(prompt('Your name (shown on your comments):','')||'').trim()||'Anonymous';
    try{localStorage.setItem(COMMENTER_KEY,name)}catch(e){} }
  return name;
}
function changeName(){
  const n=prompt('Your name (shown on your comments):', getCommenter());
  if(n!==null){ try{localStorage.setItem(COMMENTER_KEY, n.trim()||'Anonymous')}catch(e){} renderBoard(); }
}
function findTaskById(tid){
  for(const s of data.sections){ const f=s.tasks.find(t=>t.id===tid); if(f) return f; }
  return null;
}
function isThreadOpen(tk){
  if(cmtOverride.has(tk.id)) return cmtOverride.get(tk.id);
  return (tk.comments||[]).length>0;          // tasks with comments show them by default
}
function toggleComments(tid){
  const tk=findTaskById(tid); if(!tk) return;
  cmtOverride.set(tid, !isThreadOpen(tk));
  renderBoard();
}
function addInlineComment(sid,tid,inputEl){
  const text=inputEl.value.trim(); if(!text) return;
  const tk=findTask(sid,tid); if(!tk) return;
  if(!Array.isArray(tk.comments)) tk.comments=[];
  tk.comments.push({id:uid(), author:ensureCommenter(), text, ts:Date.now()});
  cmtOverride.set(tid, true);                  // keep thread open after posting
  save(); renderBoard();
}
function deleteCommentDirect(sid,tid,cid){
  const tk=findTask(sid,tid); if(!tk) return;
  if(!confirm('Delete this comment?')) return;
  tk.comments=(tk.comments||[]).filter(c=>c.id!==cid);
  save(); renderBoard();
}

/* ----- teams ----- */
function manageTeams(){
  const cur=data.teams.join(', ');
  const n=prompt('Owners (comma separated):',cur);
  if(n===null)return;
  const list=n.split(',').map(x=>x.trim()).filter(Boolean);
  if(list.length){if(!list.includes('Unassigned'))list.push('Unassigned');data.teams=list;save();render()}
}

/* ----- import/export/reset ----- */
function exportData(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='data.json';a.click();
}
function importData(ev){
  const file=ev.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{try{data=JSON.parse(r.result);save();render()}catch(e){alert('Invalid file')}};
  r.readAsText(file);ev.target.value='';
}
function resetData(){
  if(!confirm('Reset to the original seeded data? Your changes will be lost.'))return;
  data=JSON.parse(JSON.stringify(SEED));save();render();
}

/* ----- modal helpers ----- */
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')}));

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

init();
</script>
